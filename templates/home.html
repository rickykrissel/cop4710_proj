{% extends "base.html" %}

{% block content %}
<div class="text-center">
    <h1>Welcome to the Pet Adoption System</h1>
    <p>Find your perfect companion today!</p>
    <img style="border-radius: 10px;"src="https://blog.thefabulous.co/wp-content/uploads/2018/10/eric-ward-610868-unsplash-1-1060x708.jpg" width="400" height="300">
    <br>
    <br>
    <a href="/pets" class="btn btn-warning">View Available Pets</a>
    <h2>Search for a Pet</h2>
    <form action="{{ url_for('search') }}" method="POST">
        <label for="species">Species:</label>
        <input type="text" id="species" name="species" placeholder="e.g., Dog, Cat">

        <label for="breed">Breed:</label>
        <input type="text" id="breed" name="breed" placeholder="e.g., Labrador, Siamese">

        <button type="submit">Search</button>
    </form>
</div>
{% endblock %}
