{% extends "base.html" %}

{% block content %}
<h2>Pet Details</h2>

<div class="card">
    <div class="card-body">
        <h4>{{ pet.pet_name }}</h4>
        <p><strong>Species:</strong> {{ pet.species }}</p>
        <p><strong>Breed:</strong> {{ pet.breed }}</p>
        <p><strong>Shelter:</strong> {{ pet.shelter_name }}</p>
        <p><strong>Location:</strong> {{ pet.location }}</p>

        <a href="/apply?pet_id={{ pet.pet_id }}" class="btn btn-primary">
            Apply for Adoption
        </a>
    </div>
</div>

{% endblock %}
